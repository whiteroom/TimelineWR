<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <style>body,html{height:100%}body,html{box-sizing:border-box}*,:after,:before{box-sizing:inherit}@-moz-document url-prefix(){body,html{overflow:hidden!important}}::-webkit-scrollbar{width:0;background:0 0}a{color:inherit!important}figure{margin:0}hr{margin:2rem 0;border:0;border-top:1px solid #aaa}.swiper{height:100%}.swiper-slide{display:flex;justify-content:center;align-items:center}.swiper-slide img{height:100%;width:100%;display:block;object-fit:contain;object-position:right center;-webkit-box-shadow:none!important;-moz-box-shadow:none!important;box-shadow:none!important}.swiper-button-next::after,.swiper-button-prev::after{display:none!important}.swiper-next,.swiper-prev{position:absolute;left:0!important;width:100%;height:50%;background:0 0;cursor:pointer;z-index:10}.swiper-prev{bottom:0;cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 512 512"><path fill="rgba(0, 0, 0, 0.9)" d="M84.1,127.3l-42.8,42.8L256,384.7l214.6-214.6l-42.8-42.8L256,299.2L84.1,127.3z"/></svg>') 16 16,s-resize}.swiper-next{top:0;cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 512 512" style="transform: rotate(180deg)"><path fill="rgba(0, 0, 0, 0.9)" d="M84.1,127.3l-42.8,42.8L256,384.7l214.6-214.6l-42.8-42.8L256,299.2L84.1,127.3z"/></svg>') 16 16,n-resize}main{height:100%;display:flex;align-items:center;justify-content:center}.swiper-slide img {object-position: center center !important}</style>
</head>

<body>
    <main>
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://dataviz-wR.github.io/hosted-assets/assets/images/Loteria/LoteriaPages__0000_Group-1.jpg"></div>
                <div class="swiper-slide"><img src="https://dataviz-wR.github.io/hosted-assets/assets/images/Loteria/LoteriaPages__0001_Group-2.jpg"></div>
                <div class="swiper-slide"><img src="https://dataviz-wR.github.io/hosted-assets/assets/images/Loteria/LoteriaPages__0002_Group-3.jpg"></div>
                <div class="swiper-slide"><img src="https://dataviz-wR.github.io/hosted-assets/assets/images/Loteria/LoteriaPages__0003_Group-4.jpg"></div>
                <div class="swiper-slide"><img src="https://dataviz-wR.github.io/hosted-assets/assets/images/Loteria/LoteriaPages__0004_Group-5.jpg"></div>
                <div class="swiper-slide"><img src="https://dataviz-wR.github.io/hosted-assets/assets/images/Loteria/LoteriaPages__0005_Group-6.jpg"></div>
                <div class="swiper-slide"><img src="https://dataviz-wR.github.io/hosted-assets/assets/images/Loteria/LoteriaPages__0006_Group-7.jpg"></div>
            </div>

            <div class="swiper-next"></div>
            <div class="swiper-prev"></div>
        </div>
    </main>

    <script>
        new Swiper('.swiper', {
            autoplay: false,
            speed: 600,
            loop: true,
            direction: "vertical",
            navigation: {
                nextEl: '.swiper-next',
                prevEl: '.swiper-prev'
            }
        });
    </script>

</body>

</html>
