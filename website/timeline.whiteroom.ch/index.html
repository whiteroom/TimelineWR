<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The JSON Timeline Document</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="timeline3/css/timeline.css">

    <script src="timeline3/js/timeline-min.js"></script>    
</head>

<body>
    <div id="timeline-embed" style="overflow:visible;"></div>


    <script>
        var embed = document.getElementById('timeline-embed');

        window.timeline = new TL.Timeline(embed, 'data/timeline.json', {
                //theme: 'dark',
                //default_bg_color: "#222222",
                font: 'css/fonts.css',
                script_path: 'timeline3/js/',
                language: 'de',
                hash_bookmark: false,
                marker_width_min: 60,
                marker_height_min: 30,
                slide_padding_lr: 100,
                start_at_slide: 11,
                scale_factor: 0.667,
                timenav_height_percentage: 20,
            });

        var bottomOffset = 40; embed.style.height = getEmbedHeight(bottomOffset);
        window.addEventListener('resize', function () { embed.style.height = getEmbedHeight(bottomOffset); timeline.updateDisplay();})
        function getEmbedHeight(bottomOffset = 0) { const bodyHeight = parseInt(getComputedStyle(document.body).height); return (bodyHeight - bottomOffset) + "px";}

        // Export as JSON
        // let url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQeIEfze-0GvRB0qLh4K4D_QUl4GeqHA6XOFKIqDniWrB_L6dKwqZUtboY3a3ItturFe1Ct0QEhGn4y/pubhtml'
        // TL.exportJSON(url).then(console.log)
        
    </script>
</body>

</html>
